<!--
  Copie locale de templates/viewer.html
  Source : https://github.com/anthropics/skills/tree/main/skills/algorithmic-art/templates/viewer.html

  Utilisez ce fichier comme point de départ pour créer un artefact HTML
  autonome p5.js. Seules les parties marquées comme variables doivent être
  modifiées (algorithme, paramètres, contrôles).
-->

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Generative Art Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <style>
      :root {
        --anthropic-dark: #141413;
        --anthropic-light: #faf9f5;
        --anthropic-mid-gray: #b0aea5;
        --anthropic-light-gray: #e8e6dc;
        --anthropic-orange: #d97757;
        --anthropic-blue: #6a9bcc;
        --anthropic-green: #788c5d;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Poppins", sans-serif;
        background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
        min-height: 100vh;
        color: var(--anthropic-dark);
      }

      .container {
        display: flex;
        min-height: 100vh;
        padding: 20px;
        gap: 20px;
      }

      .sidebar {
        width: 320px;
        flex-shrink: 0;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        padding: 24px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(20, 20, 19, 0.1);
        overflow-y: auto;
        overflow-x: hidden;
      }

      .sidebar h1 {
        font-family: "Lora", serif;
        font-size: 24px;
        font-weight: 500;
        color: var(--anthropic-dark);
        margin-bottom: 8px;
      }

      .sidebar .subtitle {
        color: var(--anthropic-mid-gray);
        font-size: 14px;
        margin-bottom: 32px;
        line-height: 1.4;
      }

      .control-section {
        margin-bottom: 32px;
      }

      .control-section h3 {
        font-size: 16px;
        font-weight: 600;
        color: var(--anthropic-dark);
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .control-section h3::before {
        content: "•";
        color: var(--anthropic-orange);
        font-weight: bold;
      }

      .seed-input {
        width: 100%;
        background: var(--anthropic-light);
        padding: 12px;
        border-radius: 8px;
        font-family: "Courier New", monospace;
        font-size: 14px;
        margin-bottom: 12px;
        border: 1px solid var(--anthropic-light-gray);
        text-align: center;
      }

      .seed-input:focus {
        outline: none;
        border-color: var(--anthropic-orange);
        box-shadow: 0 0 0 2px rgba(217, 119, 87, 0.1);
        background: white;
      }

      .seed-controls {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-bottom: 8px;
      }

      .control-group {
        margin-bottom: 20px;
      }

      .control-group label {
        display: block;
        font-size: 14px;
        font-weight: 500;
        color: var(--anthropic-dark);
        margin-bottom: 8px;
      }

      .slider-container {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .slider-container input[type="range"] {
        flex: 1;
        height: 4px;
        background: var(--anthropic-light-gray);
        border-radius: 2px;
        outline: none;
        -webkit-appearance: none;
      }

      .slider-container input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 16px;
        height: 16px;
        background: var(--anthropic-orange);
        border-radius: 50%;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .slider-container input[type="range"]::-webkit-slider-thumb:hover {
        transform: scale(1.1);
        background: #c86641;
      }

      .slider-container input[type="range"]::-moz-range-thumb {
        width: 16px;
        height: 16px;
        background: var(--anthropic-orange);
        border-radius: 50%;
        border: none;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .value-display {
        font-family: "Courier New", monospace;
        font-size: 12px;
        color: var(--anthropic-mid-gray);
        min-width: 60px;
        text-align: right;
      }

      .button {
        background: var(--anthropic-orange);
        color: white;
        border: none;
        padding: 10px 16px;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s ease;
        width: 100%;
      }

      .button:hover {
        background: #c86641;
        transform: translateY(-1px);
      }

      .button-row {
        display: flex;
        gap: 8px;
      }

      .button-row .button {
        flex: 1;
      }

      .canvas-area {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        min-width: 0;
      }

      #canvas-container {
        width: 100%;
        max-width: 1000px;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 20px 40px rgba(20, 20, 19, 0.1);
        background: white;
      }

      #canvas-container canvas {
        display: block;
        width: 100% !important;
        height: auto !important;
      }

      .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        color: var(--anthropic-mid-gray);
      }

      @media (max-width: 600px) {
        .container {
          flex-direction: column;
        }

        .sidebar {
          width: 100%;
        }

        .canvas-area {
          padding: 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <aside class="sidebar">
        <h1>Generative Art Viewer</h1>
        <p class="subtitle">
          Utilise ce viewer comme base pour explorer des variations d’un sketch
          p5.js seedé.
        </p>

        <section class="control-section">
          <h3>Seed</h3>
          <input
            id="seed-input"
            class="seed-input"
            type="number"
            min="1"
            step="1"
            value="12345"
            onchange="updateSeed()"
          />
          <div class="seed-controls">
            <button class="button" onclick="previousSeed()">← Prev</button>
            <button class="button" onclick="nextSeed()">Next →</button>
          </div>
          <button class="button" onclick="randomSeedAndUpdate()">↻ Random</button>
        </section>

        <section class="control-section">
          <h3>Parameters</h3>
          <div class="control-group">
            <label for="particleCount">Particle Count</label>
            <div class="slider-container">
              <input
                id="particleCount"
                type="range"
                min="1000"
                max="10000"
                step="500"
                value="5000"
                oninput="updateParam('particleCount', this.value)"
              />
              <span id="particleCount-value" class="value-display">5000</span>
            </div>
          </div>
        </section>

        <section class="control-section">
          <h3>Actions</h3>
          <button class="button" onclick="resetParameters()">Reset</button>
        </section>
      </aside>

      <main class="canvas-area">
        <div id="canvas-container">
          <div class="loading">Initializing generative art...</div>
        </div>
      </main>
    </div>

    <script>
      let params = {
        seed: 12345,
        particleCount: 5000,
      };

      const defaultParams = { ...params };

      function setup() {
        const canvas = createCanvas(1200, 1200);
        canvas.parent("canvas-container");

        initializeSystem();
        document.querySelector(".loading").style.display = "none";
      }

      function initializeSystem() {
        randomSeed(params.seed);
        noiseSeed(params.seed);
        background(250, 249, 245);
        // TODO: ajouter votre algorithme p5.js ici
      }

      function draw() {
        // TODO: dessiner votre art génératif ici
        noLoop();
      }

      function updateParam(name, value) {
        params[name] = Number(value);
        document.getElementById(name + "-value").textContent = value;
        initializeSystem();
      }

      function updateSeedDisplay() {
        document.getElementById("seed-input").value = params.seed;
      }

      function updateSeed() {
        const input = document.getElementById("seed-input");
        const newSeed = parseInt(input.value, 10);
        if (Number.isFinite(newSeed) && newSeed > 0) {
          params.seed = newSeed;
          initializeSystem();
        } else {
          updateSeedDisplay();
        }
      }

      function previousSeed() {
        params.seed = Math.max(1, params.seed - 1);
        updateSeedDisplay();
        initializeSystem();
      }

      function nextSeed() {
        params.seed += 1;
        updateSeedDisplay();
        initializeSystem();
      }

      function randomSeedAndUpdate() {
        params.seed = Math.floor(Math.random() * 999999) + 1;
        updateSeedDisplay();
        initializeSystem();
      }

      function resetParameters() {
        params = { ...defaultParams };
        document.getElementById("particleCount").value = params.particleCount;
        document.getElementById("particleCount-value").textContent =
          params.particleCount;
        updateSeedDisplay();
        initializeSystem();
      }

      window.addEventListener("load", updateSeedDisplay);
    </script>
  </body>
</html>
